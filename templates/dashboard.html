<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        
        header {
            background: #0f3460;
            padding: 15px 20px;
            border-bottom: 3px solid #00d4ff;
        }
        
        h1 {
            font-size: 28px;
            color: #00d4ff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #00ff00;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            color: #00d4ff;
            font-size: 36px;
            font-weight: bold;
        }
        
        .stat-sub {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .quick-actions {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .quick-actions h2 {
            color: #00d4ff;
            margin-bottom: 15px;
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .action-btn {
            background: #533483;
            border: 2px solid #00d4ff;
            color: #fff;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }
        
        .action-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            transform: translateY(-2px);
        }
        
        .action-icon {
            font-size: 28px;
        }
        
        .recent-activity {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .recent-activity h2 {
            color: #00d4ff;
            margin-bottom: 15px;
        }
        
        .activity-log {
            background: #0f3460;
            padding: 10px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .activity-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            color: #999;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 Dashboard</h1>
    </header>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Conversations Today</h3>
                <div class="stat-value" id="conversations-count">0</div>
                <div class="stat-sub">Chat sessions started</div>
            </div>
            
            <div class="stat-card">
                <h3>Games Played</h3>
                <div class="stat-value" id="games-count">0</div>
                <div class="stat-sub">Interactive games completed</div>
            </div>
            
            <div class="stat-card">
                <h3>Timers Set</h3>
                <div class="stat-value" id="timers-count">0</div>
                <div class="stat-sub">Active reminders</div>
            </div>
            
            <div class="stat-card">
                <h3>System Uptime</h3>
                <div class="stat-value" id="uptime-display">--</div>
                <div class="stat-sub">Hours running</div>
            </div>
        </div>
        
        <div class="quick-actions">
            <h2>🚀 Quick Actions</h2>
            <div class="action-grid">
                <a href="/chat" class="action-btn">
                    <div class="action-icon">💬</div>
                    Chat
                </a>
                <a href="/timers" class="action-btn">
                    <div class="action-icon">⏱️</div>
                    Timers
                </a>
                <a href="/games" class="action-btn">
                    <div class="action-icon">🎮</div>
                    Games
                </a>
                <a href="/vision" class="action-btn">
                    <div class="action-icon">👁️</div>
                    Vision
                </a>
                <a href="/music" class="action-btn">
                    <div class="action-icon">🎵</div>
                    Music
                </a>
                <a href="/settings" class="action-btn">
                    <div class="action-icon">⚙️</div>
                    Settings
                </a>
            </div>
        </div>
        
        <div class="recent-activity">
            <h2>📋 Recent Activity</h2>
            <div class="activity-log" id="activity-log">
                <div class="activity-item">System initialized...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function updateDashboard() {
            try {
                // Get system status
                const statusResponse = await fetch('/api/status');
                const status = await statusResponse.json();
                
                // Calculate uptime in hours
                const uptime = status.system?.uptime_seconds || 0;
                const hours = (uptime / 3600).toFixed(1);
                document.getElementById('uptime-display').textContent = hours + 'h';
                
                // Get conversation history
                const historyResponse = await fetch('/api/conversation-history');
                const history = await historyResponse.json();
                const messages = history.history || [];
                
                // Count conversations (assuming a conversation is a user message)
                const userMessages = messages.filter(m => m.role === 'user').length;
                document.getElementById('conversations-count').textContent = userMessages;
                
                // Get debug info for activity log
                const debugResponse = await fetch('/api/debug');
                const debug = await debugResponse.json();
                
                // Update activity log
                const activityLog = document.getElementById('activity-log');
                activityLog.innerHTML = '';
                
                if (debug.logs && Array.isArray(debug.logs)) {
                    const recentLogs = debug.logs.slice(-5).reverse();
                    recentLogs.forEach(log => {
                        const item = document.createElement('div');
                        item.className = 'activity-item';
                        const time = log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : '';
                        item.textContent = `[${time}] ${log.type || 'INFO'}: ${log.message || JSON.stringify(log)}`;
                        activityLog.appendChild(item);
                    });
                } else {
                    activityLog.innerHTML = '<div class="activity-item">Waiting for activity...</div>';
                }
                
            } catch (error) {
                console.error('Dashboard error:', error);
            }
        }
        
        // Initial load
        updateDashboard();
        
        // Auto-update every 5 seconds
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
