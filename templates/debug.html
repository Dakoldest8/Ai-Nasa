<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        
        header {
            background: #0f3460;
            padding: 15px 20px;
            border-bottom: 3px solid #00d4ff;
        }
        
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .debug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .debug-panel {
            background: #1a1a2e;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .debug-panel h3 {
            color: #00ff00;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        #debug-logs {
            background: #0f3460;
            padding: 10px;
            border-radius: 5px;
            height: 300px;
            overflow-y: auto;
            font-size: 11px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 2px solid #00d4ff;
            border-radius: 2px;
        }
        
        .log-chat { border-left-color: #00d4ff; }
        .log-error { border-left-color: #ff0000; }
        .log-info { border-left-color: #00ff00; }
        
        .system-info {
            display: grid;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: #0f3460;
            border-radius: 3px;
        }
        
        .info-label {
            color: #00ff00;
            font-weight: bold;
        }
        
        .info-value {
            color: #fff;
        }
        
        .nav-btn {
            background: #533483;
            border: 2px solid #00d4ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .debug-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🐛 Debug Panel</h1>
    </header>
    
    <div class="container">
        <div class="debug-grid">
            <div class="debug-panel">
                <h3>System Status</h3>
                <div class="system-info">
                    <div class="info-row">
                        <div class="info-label">LLM Status</div>
                        <div class="info-value" id="llm-status">Checking...</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">CPU Usage</div>
                        <div class="info-value" id="cpu-usage">--</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Memory Usage</div>
                        <div class="info-value" id="mem-usage">--</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Uptime</div>
                        <div class="info-value" id="uptime">--</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Chat Messages</div>
                        <div class="info-value" id="msg-count">0</div>
                    </div>
                </div>
            </div>
            
            <div class="debug-panel">
                <h3>Debug Logs</h3>
                <div id="debug-logs"></div>
                <button style="width: 100%; margin-top: 10px; background: #533483;" onclick="scrollLogsToBottom()">Auto-scroll</button>
            </div>
        </div>
        
        <a href="/" class="nav-btn">← Back to Dashboard</a>
    </div>
    
    <script>
        let autoScroll = true;
        
        async function updateDebug() {
            try {
                const response = await fetch('/api/debug');
                const data = response.json().catch(() => ({}));
                const data2 = await data;
                
                // Update system info
                document.getElementById('llm-status').textContent = 
                    data2.system?.llm_ready ? '✅ Ready' : '❌ Offline';
                document.getElementById('cpu-usage').textContent = 
                    (data2.system?.cpu_percent || 0).toFixed(1) + '%';
                document.getElementById('mem-usage').textContent = 
                    (data2.system?.memory_percent || 0).toFixed(1) + '%';
                
                const uptime = data2.system?.uptime_seconds || 0;
                const hours = Math.floor(uptime / 3600);
                const minutes = Math.floor((uptime % 3600) / 60);
                document.getElementById('uptime').textContent = hours + 'h ' + minutes + 'm';
                
                document.getElementById('msg-count').textContent = data2.history_length || 0;
                
                // Update logs
                const logsDiv = document.getElementById('debug-logs');
                logsDiv.innerHTML = '';
                
                if (data2.logs && Array.isArray(data2.logs)) {
                    data2.logs.forEach(log => {
                        const entry = document.createElement('div');
                        entry.className = 'log-entry log-' + (log.type || 'info');
                        const time = log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : '';
                        entry.textContent = `[${time}] ${log.type || 'INFO'}: ${log.message || JSON.stringify(log)}`;
                        logsDiv.appendChild(entry);
                    });
                    
                    if (autoScroll) {
                        logsDiv.scrollTop = logsDiv.scrollHeight;
                    }
                }
            } catch (error) {
                console.error('Debug error:', error);
            }
        }
        
        function scrollLogsToBottom() {
            const logsDiv = document.getElementById('debug-logs');
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        updateDebug();
        setInterval(updateDebug, 2000);
    </script>
</body>
</html>
