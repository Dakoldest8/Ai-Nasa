<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision & Cameras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        
        header {
            background: #0f3460;
            padding: 15px 20px;
            border-bottom: 3px solid #00d4ff;
        }
        
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .vision-area {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        #camera-preview {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: #000;
            border: 2px solid #00d4ff;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        
        button {
            background: #533483;
            border: 2px solid #00d4ff;
            color: #fff;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            width: 100%;
        }
        
        button:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        .vision-results {
            background: #0f3460;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        .nav-btn {
            background: #533483;
            border: 2px solid #00d4ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>📸 Vision & Camera Analysis</h1>
    </header>
    
    <div class="container">
        <div class="vision-area">
            <h2>Camera Controls</h2>
            <button onclick="captureImage()">📸 Capture Image</button>
            <button onclick="analyzeImage()">🔍 Analyze Last Image</button>
            <button onclick="toggleLiveView()">📹 Toggle Live View</button>
            
            <video id="camera-preview"></video>
            
            <div id="analysis-results" class="vision-results" style="display: none;">
                <h3 style="color: #00ff00;">Analysis Results</h3>
                <p id="results-text">Analyzing...</p>
            </div>
        </div>
        
        <a href="/" class="nav-btn">← Back to Dashboard</a>
    </div>
    
    <script>
        let camStream = null;
        let lastImage = null;
        
        function captureImage() {
            fetch('/api/capture', {
                method: 'POST'
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    lastImage = data.image_path;
                    alert('Image captured!');
                    document.getElementById('analysis-results').style.display = 'none';
                }
            }).catch(err => {
                alert('Failed to capture image: ' + err.message);
            });
        }
        
        function analyzeImage() {
            if (!lastImage) {
                alert('No image captured yet');
                return;
            }
            
            document.getElementById('analysis-results').style.display = 'block';
            document.getElementById('results-text').textContent = 'Analyzing image with moondream...';
            
            fetch('/api/analyze-image', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    image_path: lastImage
                })
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    document.getElementById('results-text').textContent = data.analysis;
                } else {
                    document.getElementById('results-text').textContent = 'Error: ' + data.message;
                }
            });
        }
        
        function toggleLiveView() {
            const video = document.getElementById('camera-preview');
            if (!camStream) {
                navigator.mediaDevices.getUserMedia({video: true})
                    .then(stream => {
                        camStream = stream;
                        video.srcObject = stream;
                        video.style.display = 'block';
                    })
                    .catch(err => alert('Camera access denied: ' + err.message));
            } else {
                camStream.getTracks().forEach(track => track.stop());
                camStream = null;
                video.style.display = 'none';
            }
        }
    </script>
</body>
</html>
